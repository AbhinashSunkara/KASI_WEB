<div class="md:min-h-[90vh] mt-10 md:mt-0 mb-10 md:mb-0 flex flex-col lg:flex-row">

  <!-- LEFT -->
  <div class="hidden lg:flex w-1/2 bg-[#0B4F5C] text-white items-center justify-center">
    <div class="text-center px-10 max-w-md">

      <div class="mb-4 flex justify-center">
        <div class="w-12 h-12 rounded-full bg-white/10 flex items-center justify-center text-lg">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-heart-icon lucide-heart"><path d="M2 9.5a5.5 5.5 0 0 1 9.591-3.676.56.56 0 0 0 .818 0A5.49 5.49 0 0 1 22 9.5c0 2.29-1.5 4-3 5.5l-5.492 5.313a2 2 0 0 1-3 .019L5 15c-1.5-1.5-3-3.2-3-5.5"/></svg>
        </div>
      </div>

      <h1 class="text-3xl font-bold mb-3 leading-snug">
        Every Life Deserves a<br />Fighting Chance
      </h1>

      <p class="text-white/80 text-xs mb-6">
        Join thousands of compassionate donors making a difference in patients' lives.
      </p>

      <div class="flex justify-center gap-6 text-xs">
        <div>
          <p class="text-lg font-semibold">1,200+</p>
          <p class="text-white/70">Patients</p>
        </div>
        <div>
          <p class="text-lg font-semibold">$4.2M</p>
          <p class="text-white/70">Raised</p>
        </div>
        <div>
          <p class="text-lg font-semibold">98%</p>
          <p class="text-white/70">Verified</p>
        </div>
      </div>

    </div>
  </div>

  <!-- RIGHT -->
  <div class="w-full lg:w-1/2 flex items-center justify-center bg-gray-50 px-4">

    <div class="w-full max-w-sm">

      <!-- Logo -->
      <div class="mb-4 flex items-center gap-2 text-gray-700 font-semibold text-sm">
        <div class="w-7 h-7 rounded-full bg-teal-700 text-white flex items-center justify-center text-xs">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-heart-icon lucide-heart"><path d="M2 9.5a5.5 5.5 0 0 1 9.591-3.676.56.56 0 0 0 .818 0A5.49 5.49 0 0 1 22 9.5c0 2.29-1.5 4-3 5.5l-5.492 5.313a2 2 0 0 1-3 .019L5 15c-1.5-1.5-3-3.2-3-5.5"/></svg>
        </div>
        K.A.S.I.
      </div>

      <!-- Title -->
      <h2 class="text-xl font-bold text-gray-900 mb-1">
        Welcome back
      </h2>
      <p class="text-xs text-gray-500 mb-5">
        Sign in to continue supporting lives.
      </p>

      <!-- FORM -->
      <form #loginForm="ngForm" (ngSubmit)="onLogin()" class="space-y-3" novalidate>

        <!-- Email -->
        <div>
          <label class="text-xs font-medium text-gray-700">Email</label>
          <input name="username"
            [(ngModel)]="username"
            required
            class="w-full mt-1 h-9 px-3 border rounded-md text-xs focus:ring-2 focus:ring-teal-600 outline-none"
            placeholder="you@example.com" />
        </div>

        <!-- Password -->
        <div>
          <div class="flex justify-between text-xs">
            <label class="font-medium text-gray-700">Password</label>
            <a routerLink="/forgot-password" class="text-teal-700">Forgot?</a>
          </div>

          <div class="relative">
            <input
              name="password"
              [type]="showPassword ? 'text' : 'password'"
              [(ngModel)]="password"
              required
              class="w-full mt-1 h-9 px-3 pr-9 border rounded-md text-xs focus:ring-2 focus:ring-teal-600 outline-none"
              placeholder="Enter password"
            />

            <button
                type="button"
                (click)="togglePasswordVisibility()"
                class="absolute inset-y-0 right-2 flex items-center text-xl pr-1 text-slate-700 hover:text-orange-600"
                tabindex="-1"
              >
                <ng-container *ngIf="showPassword; else eyeIcon">
                  <!-- eye-off icon -->
                  <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.733 5.076a10.744 10.744 0 0 1 11.205 6.575 1 1 0 0 1 0 .696 10.747 10.747 0 0 1-1.444 2.49"/><path d="M14.084 14.158a3 3 0 0 1-4.242-4.242"/><path d="M17.479 17.499a10.75 10.75 0 0 1-15.417-5.151 1 1 0 0 1 0-.696 10.75 10.75 0 0 1 4.446-5.143"/><path d="m2 2 20 20"/></svg>
                </ng-container>
                <ng-template #eyeIcon>
                  <!-- eye icon -->
                  <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/><circle cx="12" cy="12" r="3"/></svg>
                </ng-template>
              </button>
          </div>
        </div>

        <!-- CAPTCHA -->
        <div>
          <label class="text-xs font-medium text-gray-700">Captcha</label>

          <div class="flex items-center gap-2 mt-1">
            <img [src]="captchaImageUrl" class="h-9 border rounded" />
            <button type="button" (click)="loadCaptcha()" class="text-[10px] text-teal-600">
              Refresh
            </button>
          </div>

          <input name="captcha"
            [(ngModel)]="captchaInput"
            required
            class="w-full mt-2 h-9 px-3 border rounded-md text-xs"
            placeholder="Enter captcha" />
        </div>

        <!-- Submit -->
        <button type="submit"
          [disabled]="loginForm.invalid || isLoading"
          class="w-full h-10 bg-teal-800 text-white rounded-md text-sm font-medium hover:bg-teal-900 transition">

          <span *ngIf="!isLoading">Sign In</span>

          <span *ngIf="isLoading" class="text-xs">
            Processing...
          </span>

        </button>

        <!-- Divider -->
<div class="relative my-5">
  <div class="absolute inset-0 flex items-center">
    <span class="w-full border-t border-gray-300"></span>
  </div>
  <div class="relative flex justify-center text-xs">
    <span class="bg-gray-50 px-3 text-gray-500 font-medium">OR</span>
  </div>
</div>

<!-- Google Sign-In -->
<button (click)="signInWithGoogle()"
  class="w-full h-10 flex items-center justify-center gap-2 border border-gray-300 rounded-lg bg-white hover:bg-gray-100 transition text-sm font-medium text-gray-700">

  <!-- Google Icon -->
  <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m22 7-8.991 5.727a2 2 0 0 1-2.009 0L2 7"/><rect x="2" y="4" width="20" height="16" rx="2"/></svg>

  <span>Continue with Google</span>
</button>

      </form>

      <!-- Footer -->
      <p class="text-center text-xs mt-5 text-gray-500">
        Don’t have an account?
        <a routerLink="/auth/register" class="text-teal-700 font-medium">Create</a>
      </p>

    </div>
  </div>
</div>
