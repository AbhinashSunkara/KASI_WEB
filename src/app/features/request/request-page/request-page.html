<!-- Logged in -->
<ng-container *ngIf="ctx.isLoggedIn; else loginBlock">
  <app-stepper></app-stepper>
</ng-container>

<!-- Not logged in -->
<ng-template #loginBlock>

  <section class="min-h-screen flex items-center justify-center px-6 bg-gradient-to-b from-gray-50 to-white">

    <div class="w-full max-w-md">

      <div class="bg-white rounded-3xl p-8 text-center
                  shadow-[0_20px_60px_rgba(0,0,0,0.08)]
                  border border-gray-100
                  transition-all duration-300">

        <!-- Icon -->
        <div class="w-16 h-16 mx-auto mb-5 flex items-center justify-center
                    rounded-2xl bg-primary/10 text-primary text-2xl
                    shadow-sm">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-shield-ban-icon lucide-shield-ban"><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/><path d="m4.243 5.21 14.39 12.472"/></svg>
        </div>

        <!-- Title -->
        <h2 class="text-2xl font-semibold text-gray-900 mb-2">
          Continue Your Request
        </h2>

        <!-- Subtitle -->
        <p class="text-gray-500 text-sm mb-6 leading-relaxed">
          You need to be logged in to submit a medical request.
          It only takes a few seconds.
        </p>

        <!-- CTA -->
        <button 
          (click)="goToLogin()"
          class="w-full bg-primary text-white py-3 rounded-xl font-semibold
                 hover:bg-primaryDark hover:shadow-md
                 active:scale-[0.98]
                 transition-all duration-200">
          Login to Continue →
        </button>

        <!-- Divider -->
        <div class="flex items-center gap-3 my-6">
          <div class="flex-1 h-px bg-gray-200"></div>
          <span class="text-xs text-gray-400">OR</span>
          <div class="flex-1 h-px bg-gray-200"></div>
        </div>

        <!-- Secondary -->
        <p class="text-sm text-gray-500">
          New here?
          <a routerLink="/auth/register"
             class="text-primary font-medium hover:underline ml-1">
            Create an account
          </a>
        </p>

      </div>

    </div>

  </section>

</ng-template>
