[build]
  base = "."
  command = "npm install --legacy-peer-deps && npm run build -- --configuration production"
  publish = "dist/KASI_WEB/browser"

[build.environment]
  NODE_VERSION = "20.19.4"
  NPM_FLAGS = "--legacy-peer-deps"

# ----------------------------
# API Proxy (FIXED)
# ----------------------------

[[redirects]]
  from = "/api/kasi/*"
  to = "https://kasiapi-argzdydcgxc0bmfs.centralindia-01.azurewebsites.net/api/:splat"
  status = 200
  force = true

# Optional (if you use content API)
[[redirects]]
  from = "/api/content/*"
  to = "https://kasiapi-argzdydcgxc0bmfs.centralindia-01.azurewebsites.net/api/content/:splat"
  status = 200
  force = true

# Generic fallback (keep LAST)
[[redirects]]
  from = "/api/*"
  to = "https://kasiapi-argzdydcgxc0bmfs.centralindia-01.azurewebsites.net/api/:splat"
  status = 200
  force = true

# ----------------------------
# Angular SPA fallback
# ----------------------------
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ----------------------------
# Security Headers
# ----------------------------
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    Content-Security-Policy = "frame-ancestors 'none'"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"