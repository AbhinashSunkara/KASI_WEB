<section class="py-20">

  <div class="max-w-6xl mx-auto px-6">

    <!-- Header -->
    <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 mb-12">

      <!-- Left -->
      <div>
        <h2 class="text-3xl md:text-4xl font-bold mb-2">
          Active Cases
        </h2>
        <p class="text-gray-600">
          Support patients who need urgent medical care.
        </p>
      </div>

      <!-- Right -->
      <a 
        routerLink="/cases"
        class="bg-primary hover:bg-primaryDark text-white px-5 py-2 rounded-lg font-semibold text-center"
      >
        View All Cases →
      </a>

    </div>

    <!-- Cards -->
    <div class="grid md:grid-cols-3 gap-8">

      <div 
        *ngFor="let c of cases"
        class="bg-white rounded-xl shadow-sm hover:shadow-md transition overflow-hidden"
      >

        <!-- Image -->
        <div class="h-40 bg-gray-200">
          <img 
            src="https://images.unsplash.com/photo-1579154204601-01588f351e67"
            class="w-full h-full object-cover"
          />
        </div>

        <!-- Content -->
        <div class="p-6">

          <h3 class="text-lg font-semibold">
            {{ c.name }}
          </h3>

          <p class="text-sm text-gray-500 mb-2">
            {{ c.condition }}
          </p>

          <p class="text-sm text-gray-400 mb-4">
            {{ c.hospital }}
          </p>

          <!-- Progress -->
          <div class="mb-2">
            <div class="w-full bg-gray-200 h-2 rounded-full">
              <div 
                class="bg-primary h-2 rounded-full"
                [style.width.%]="getProgress(c.raised, c.goal)"
              ></div>
            </div>
          </div>

          <!-- Amount -->
          <div class="flex justify-between text-sm mb-4">
            <span class="font-semibold text-primary">
              ₹{{ c.raised | number }}
            </span>
            <span class="text-gray-500">
              of ₹{{ c.goal | number }}
            </span>
          </div>

          <!-- CTA -->
          <button class="w-full bg-primary hover:bg-primaryDark text-white py-2 rounded-lg">
            Donate Now
          </button>

        </div>

      </div>

    </div>

  </div>

</section>
