<header class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-gray-200">

  <div class="max-w-7xl mx-auto px-6 py-3 flex items-center justify-between">

    <!-- Logo -->
    <a routerLink="/" class="text-2xl font-bold text-primary tracking-tight">
      KASI
    </a>

    <!-- Desktop Nav -->
    <nav class="hidden md:flex items-center gap-8 text-sm font-medium text-gray-700">
      <a routerLink="/" routerLinkActive="text-primary font-semibold" [routerLinkActiveOptions]="{ exact: true }" class="hover:text-primary transition">Home</a>
      <a routerLink="/cases" routerLinkActive="text-primary font-semibold" class="hover:text-primary transition">Cases</a>
      <a routerLink="/request" routerLinkActive="text-primary font-semibold" class="hover:text-primary transition">Request</a>
    </nav>

    <!-- Right -->
    <div class="flex items-center gap-3 relative">

      <!-- ========================= -->
      <!-- NOT LOGGED IN -->
      <!-- ========================= -->
      <a 
        *ngIf="!context.isLoggedIn"
        routerLink="/auth/login"
        class="hidden md:block border border-primary text-primary hover:bg-primary hover:text-white px-5 py-2 rounded-xl text-sm font-semibold transition"
      >
        Login
      </a>

      <!-- ========================= -->
      <!-- LOGGED IN -->
      <!-- ========================= -->
      <div *ngIf="context.isLoggedIn" class="hidden md:block relative">

        <button 
          (click)="toggleProfileMenu($event)"
          class="flex items-center gap-2 px-3 py-1.5 rounded-xl hover:bg-gray-100 transition"
        >
          <div class="w-8 h-8 rounded-full bg-primary/10 flex items-center justify-center text-primary font-semibold">
            {{ context.role ? context.role[0] : 'U' }}
          </div>
          <span class="text-sm font-medium text-gray-700">
            Profile
          </span>
        </button>

        <!-- Dropdown -->
        <div 
          *ngIf="isProfileMenuOpen"
          class="absolute right-0 mt-2 w-44 bg-white border border-gray-100 rounded-xl shadow-lg py-2"
        >
          <a 
            routerLink="/profile"
            (click)="closeMenus()"
            class="block px-4 py-2 text-sm hover:bg-gray-50"
          >
            View Profile
          </a>

          <button 
            (click)="logout()"
            class="w-full text-left px-4 py-2 text-sm text-red-500 hover:bg-gray-50"
          >
            Logout
          </button>
        </div>

      </div>

      <!-- Donate -->
      <button class="hidden md:block bg-primary hover:bg-primaryDark text-white px-5 py-2 rounded-xl text-sm font-semibold transition">
        Donate
      </button>

      <!-- Mobile Toggle -->
      <button (click)="toggleMobileMenu($event)" class="md:hidden p-2 rounded-lg hover:bg-gray-100 transition">

        <svg *ngIf="!isMobileMenuOpen" xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>

        <svg *ngIf="isMobileMenuOpen" xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 6l12 12M6 18L18 6"/>
        </svg>

      </button>

    </div>

  </div>

  <!-- ========================= -->
  <!-- MOBILE MENU -->
  <!-- ========================= -->
  <div 
    *ngIf="isMobileMenuOpen" 
    class="md:hidden border-t border-gray-200 bg-white shadow-md"
  >
    <div class="flex flex-col px-6 py-5 gap-4 text-sm font-medium text-gray-700">

      <a routerLink="/" (click)="closeMenus()" class="hover:text-primary">Home</a>
      <a routerLink="/cases" (click)="closeMenus()" class="hover:text-primary">Cases</a>
      <a routerLink="/request" (click)="closeMenus()" class="hover:text-primary">Request</a>

      <!-- NOT LOGGED IN -->
      <a 
        *ngIf="!context.isLoggedIn"
        routerLink="/auth/login" 
        (click)="closeMenus()" 
        class="hover:text-primary"
      >
        Login
      </a>

      <!-- LOGGED IN -->
      <div *ngIf="context.isLoggedIn" class="flex flex-col gap-3">

        <a routerLink="/profile" (click)="closeMenus()" class="hover:text-primary">
          View Profile
        </a>

        <button 
          (click)="logout()"
          class="text-left text-red-500"
        >
          Logout
        </button>

      </div>

      <!-- Donate -->
      <button 
        (click)="closeMenus()" 
        class="mt-2 bg-primary text-white py-2.5 rounded-xl font-semibold"
      >
        Donate
      </button>

    </div>
  </div>

</header>
