<header class="bg-white border-b border-gray-200 shadow-sm sticky top-0 z-50">

  <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">

    <!-- Logo -->
    <div class="text-2xl font-bold text-primary">
     <a routerLink="/" class="hover:text-primary">KASI</a>
    </div>

    <!-- Navigation -->
    <nav class="hidden md:flex items-center gap-8 text-gray-700 font-medium">
      <a routerLinkActive="text-green-700" [routerLinkActiveOptions]="{ exact: true }" class="font-semibold" routerLink="/" class="hover:text-primary">Home</a>
      <a routerLinkActive="text-green-700 font-semibold" routerLink="/cases" class="hover:text-primary">Cases</a>
      <a routerLinkActive="text-green-700 font-semibold" routerLink="/request" class="hover:text-primary">Request Support</a>
    </nav>

    <!-- CTA -->
    <div class="hidden md:block">
      <button class="bg-primary hover:bg-primaryDark text-white px-5 py-2 rounded-lg">
        Donate
      </button>
    </div>

    <!-- Mobile Menu Icon -->
    <div class="md:hidden">
      <button>
        ☰
      </button>
    </div>

  </div>

</header>
