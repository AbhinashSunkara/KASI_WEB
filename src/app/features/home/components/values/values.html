<section class="py-20 md:py-24 bg-gradient-to-b from-gray-50 to-white">

  <div class="max-w-7xl mx-auto px-6 text-center">

    <!-- Heading -->
    <h2 class="text-3xl md:text-4xl font-bold mb-4 text-gray-900">
      Built on Values that Matter
    </h2>

    <p class="text-gray-600 mb-14 max-w-2xl mx-auto">
      We ensure every contribution creates real impact through our core principles.
    </p>

    <!-- Cards -->
    <div class="grid gap-6 md:grid-cols-3">

      <div 
        *ngFor="let item of items"
        class="group bg-white/80 backdrop-blur-sm p-8 rounded-2xl shadow-[0_10px_30px_rgba(0,0,0,0.06)] transition-all duration-300 hover:shadow-[0_20px_50px_rgba(0,0,0,0.12)] hover:-translate-y-2"
      >

        <!-- Icon container -->
        <div class="w-14 h-14 flex items-center justify-center mx-auto mb-5 rounded-xl bg-primary/10 text-primary text-2xl group-hover:scale-110 transition">
          {{ item.icon }}
        </div>

        <!-- Title -->
        <h3 class="text-lg md:text-xl font-semibold mb-2 text-gray-900">
          {{ item.title }}
        </h3>

        <!-- Description -->
        <p class="text-gray-600 text-sm md:text-base leading-relaxed">
          {{ item.description }}
        </p>

      </div>

    </div>

  </div>

</section>
