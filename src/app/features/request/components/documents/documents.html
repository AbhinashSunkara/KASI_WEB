<section class="p-6">

  <h2 class="text-2xl font-bold mb-4">
    Upload Documents
  </h2>

  <p class="text-gray-600 mb-6">
    Please upload medical reports and supporting documents.
  </p>

  <!-- Upload Box -->
  <div class="border-2 border-dashed border-gray-300 rounded-xl p-8 text-center">

    <input 
      type="file"
      multiple
      (change)="onFileSelect($event)"
      class="hidden"
      #fileInput
    />

    <button 
      (click)="fileInput.click()"
      class="bg-primary text-white px-6 py-2 rounded-lg"
    >
      Upload Files
    </button>

    <p class="text-sm text-gray-500 mt-2">
      Supported: PDF, JPG, PNG
    </p>

  </div>

  <!-- File List -->
  <div class="mt-6 space-y-3">

    <div 
      *ngFor="let file of files; let i = index"
      class="flex items-center justify-between bg-gray-100 p-3 rounded-lg"
    >

      <span class="text-sm">
        {{ file.name }}
      </span>

      <button 
        (click)="removeFile(i)"
        class="text-red-500 text-sm"
      >
        Remove
      </button>

    </div>

  </div>

  <!-- Submit Button -->
<div class="mt-6 text-right">
  <button 
    (click)="submit()"
    class="bg-primary text-white px-6 py-2 rounded-lg hover:bg-primaryDark"
  >
    Save & Continue
  </button>
</div>

</section>
