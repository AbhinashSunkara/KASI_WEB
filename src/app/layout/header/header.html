<header class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-gray-200">

  <div class="max-w-7xl mx-auto px-6 py-3 flex items-center justify-between">

    <!-- Logo -->
    <a routerLink="/" class="text-2xl font-bold text-primary tracking-tight">
      KASI
    </a>

    <!-- Desktop Nav -->
    <nav class="hidden md:flex items-center gap-8 text-sm font-medium text-gray-700">
      <a routerLink="/" routerLinkActive="text-primary font-semibold" [routerLinkActiveOptions]="{ exact: true }" class="hover:text-primary transition">Home</a>
      <a routerLink="/cases" routerLinkActive="text-primary font-semibold" class="hover:text-primary transition">Cases</a>
      <a routerLink="/request" routerLinkActive="text-primary font-semibold" class="hover:text-primary transition">Request</a>
    </nav>

    <!-- Right -->
    <div class="flex items-center gap-3">

      <button class="hidden md:block bg-primary hover:bg-primaryDark text-white px-5 py-2 rounded-xl text-sm font-semibold transition">
        Donate
      </button>

      <!-- Toggle Button -->
      <button (click)="toggleMenu($event)" class="md:hidden p-2 rounded-lg hover:bg-gray-100 transition">

        <!-- Hamburger -->
        <svg *ngIf="!isMenuOpen" xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>

        <!-- Close (X) -->
        <svg *ngIf="isMenuOpen" xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 6l12 12M6 18L18 6"/>
        </svg>

      </button>

    </div>

  </div>

  <!-- Mobile Menu -->
  <div 
    *ngIf="isMenuOpen" 
    class="md:hidden border-t border-gray-200 bg-white shadow-md"
  >
    <div class="flex flex-col px-6 py-5 gap-4 text-sm font-medium text-gray-700">

      <a routerLink="/" (click)="closeMenu()" class="hover:text-primary">Home</a>
      <a routerLink="/cases" (click)="closeMenu()" class="hover:text-primary">Cases</a>
      <a routerLink="/request" (click)="closeMenu()" class="hover:text-primary">Request</a>

      <button (click)="closeMenu()" class="mt-2 bg-primary text-white py-2.5 rounded-xl font-semibold">
        Donate
      </button>

    </div>
  </div>

</header>
