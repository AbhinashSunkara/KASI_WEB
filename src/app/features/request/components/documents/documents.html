<section class="max-w-2xl mx-auto">

  <!-- Header -->
  <div class="mb-5 text-center">

    <h2 class="text-xl md:text-2xl font-semibold text-gray-900 mb-1">
      Upload Documents
    </h2>

    <p class="text-sm text-gray-500">
      Upload medical reports and supporting files
    </p>

  </div>

  <!-- Upload Box -->
  <div 
    class="border-2 border-dashed border-gray-300 rounded-xl p-6 md:p-8 text-center cursor-pointer hover:border-primary transition"
    (click)="fileInput.click()"
  >

    <input 
      type="file"
      multiple
      (change)="onFileSelect($event)"
      class="hidden"
      #fileInput
    />

    <!-- Icon -->
    <div class="mb-3 flex justify-center text-gray-400">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-10 h-10" fill="none" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 16V4m0 0l-4 4m4-4l4 4M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2"/>
      </svg>
    </div>

    <!-- Text -->
    <p class="text-sm font-medium text-gray-700">
      Click to upload files
    </p>

    <p class="text-xs text-gray-500 mt-1">
      PDF, JPG, PNG
    </p>

  </div>

  <!-- File List -->
  <div *ngIf="uploadedFiles.length > 0" class="mt-5 space-y-2">

    <div 
      *ngFor="let file of uploadedFiles; let i = index"
      class="flex items-center justify-between bg-gray-50 border rounded-lg px-3 py-2"
    >

      <!-- File name -->
      <span class="text-sm text-gray-700 truncate">
        {{ file.fileName }}
      </span>

      <!-- Remove -->
      <button 
        (click)="removeFile(i)"
        class="text-red-500 text-xs hover:underline"
      >
        Remove
      </button>

    </div>

  </div>

  <!-- Empty State -->
  <p *ngIf="uploadedFiles?.length === 0" class="text-xs text-gray-400 mt-4 text-center">
    No files uploaded yet
  </p>

  <!-- Submit -->
  <div class="mt-6">
    <button 
      (click)="submit()"
      class="w-full bg-primary text-white py-2.5 rounded-lg text-sm font-semibold hover:bg-primaryDark transition"
    >
      Continue →
    </button>
  </div>

</section>
