<section class="py-10 max-w-2xl mx-auto">

  <div class="max-w-2xl mx-auto px-4">

    <!-- Header -->
    <div class="mb-6 text-center">

      <h2 class="text-2xl md:text-3xl font-semibold text-gray-900 mb-1">
        Patient Information
      </h2>

      <p class="text-sm text-gray-500">
        Provide basic details to continue your request
      </p>

    </div>

    <!-- Card -->
    <div class="bg-white rounded-xl shadow-sm p-5 md:p-6">

      <form [formGroup]="form" class="space-y-4">

        <!-- Name -->
        <div>
          <label class="block text-sm font-medium mb-1">Full Name *</label>
          <input 
            type="text"
            formControlName="name"
            class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary transition"
            [ngClass]="{'border-red-500': f['name'].touched && f['name'].invalid}"
          />
          <p *ngIf="f['name'].touched && f['name'].invalid"
             class="text-red-500 text-xs mt-1">
            Name is required
          </p>
        </div>

        <!-- Age + Gender -->
        <div class="grid grid-cols-2 gap-3">

          <div>
            <label class="block text-sm font-medium mb-1">Age *</label>
            <input 
              type="number"
              formControlName="age"
              class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary transition"
              [ngClass]="{'border-red-500': f['age'].touched && f['age'].invalid}"
            />
            <p *ngIf="f['age'].touched && f['age'].invalid"
               class="text-red-500 text-xs mt-1">
              Required
            </p>
          </div>

          <div>
            <label class="block text-sm font-medium mb-1">Gender *</label>
            <select 
              formControlName="gender"
              class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary transition"
              [ngClass]="{'border-red-500': f['gender'].touched && f['gender'].invalid}"
            >
              <option value="">Select</option>
              <option value="male">Male</option>
              <option value="female">Female</option>
              <option value="other">Other</option>
            </select>
            <p *ngIf="f['gender'].touched && f['gender'].invalid"
               class="text-red-500 text-xs mt-1">
              Required
            </p>
          </div>

        </div>

        <!-- Phone -->
        <div>
          <label class="block text-sm font-medium mb-1">Phone *</label>
          <input 
            type="text"
            formControlName="phone"
            class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary transition"
            [ngClass]="{'border-red-500': f['phone'].touched && f['phone'].invalid}"
          />
          <p *ngIf="f['phone'].touched && f['phone'].invalid"
             class="text-red-500 text-xs mt-1">
            Invalid phone
          </p>
        </div>

        <!-- City -->
        <div>
          <label class="block text-sm font-medium mb-1">City *</label>
          <input 
            type="text"
            formControlName="city"
            class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary transition"
            [ngClass]="{'border-red-500': f['city'].touched && f['city'].invalid}"
          />
          <p *ngIf="f['city'].touched && f['city'].invalid"
             class="text-red-500 text-xs mt-1">
            Required
          </p>
        </div>

        <!-- Submit -->
        <div class="pt-2">
          <button 
            type="button"
            (click)="submit()"
            class="w-full bg-primary hover:bg-primaryDark text-white py-2.5 rounded-lg text-sm font-semibold transition-all duration-300"
          >
            Continue →
          </button>
        </div>

      </form>

    </div>

  </div>

</section>
